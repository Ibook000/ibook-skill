<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  {{FONT_FACE}}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: {{FONT_FAMILY}};
    width: 1080px;
    min-height: 1440px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dark {
    background: linear-gradient(160deg, #111844 0%, #1a1f36 40%, #1f2847 100%);
    color: #e8e8e8;
  }
  .dark .card {
    background: rgba(75,86,148,0.15);
    border: 1px solid rgba(75,86,148,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .dark .title { color: #EAE0CF; }
  .dark .subtitle { color: rgba(234,224,207,0.5); }
  .dark .divider { background: linear-gradient(90deg, transparent, #7288AE, transparent); }
  .dark .accent-line { background: linear-gradient(90deg, #7288AE, transparent); }
  .dark .glow { background: radial-gradient(circle, rgba(75,86,148,0.12) 0%, transparent 70%); }
  .dark .deco-grid { background-image: linear-gradient(rgba(114,136,174,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(114,136,174,0.1) 1px, transparent 1px); }

.container {
    width: 100%;
    min-height: 1440px;
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .glow {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    pointer-events: none;
  }

  .glow-bottom {
    position: absolute;
    bottom: -300px;
    left: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    pointer-events: none;
  }

  /* === 装饰元素：专业网格 === */
  .deco-grid {
    position: absolute;
    inset: 0;
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  /* === 水印 === */
  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 180px;
    font-weight: 900;
    letter-spacing: 20px;
    color: rgba(234,224,207,0.03);
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
    user-select: none;
  }
.card {
    position: relative;
    z-index: 1;
    border-radius: 24px;
    padding: 90px 80px;
    text-align: center;
    max-width: 900px;
  }

  .accent-line {
    width: 60px;
    height: 4px;
    border-radius: 2px;
    margin: 0 auto 50px auto;
  }

  .title {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.35;
    letter-spacing: -1px;
    margin-bottom: 30px;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 400;
    line-height: 1.6;
  }

  .divider {
    width: 120px;
    height: 2px;
    margin: 50px auto;
    border-radius: 1px;
  }
</style>
</head>
<body>
<div class="container {{STYLE_CLASS}}">
  <div class="glow"></div>
  <div class="glow glow-bottom"></div>
  <div class="deco-grid"></div>
  <div class="watermark">IBOOK</div>

  <div class="card">
    <div class="accent-line"></div>
    <h1 class="title">{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </div>
</div>
</body>
</html>
